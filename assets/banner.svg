  <!-- Stats pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="14">
    <rect x="36" y="348" width="100" height="28" fill="#1a1f29" stroke="#30363d" stroke-width="1" rx="14"/>
    <text x="86" y="367" text-anchor="middle" fill="#8b949e"><tspan fill="#e8a87c" font-weight="bold">41</tspan> agents</text>

    <rect x="148" y="348" width="128" height="28" fill="#1a1f29" stroke="#30363d" stroke-width="1" rx="14"/>
    <text x="212" y="367" text-anchor="middle" fill="#8b949e"><tspan fill="#e8a87c" font-weight="bold">22</tspan> commands</text>

