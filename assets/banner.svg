    <text x="78" y="444" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">BRAINSTORM</text>

    <text x="126" y="444" font-size="13" fill="#484f58">&#x2192;</text>

    <rect x="138" y="426" width="64" height="28" fill="#1a1f29" stroke="#e8a87c" stroke-width="1.2" rx="5"/>
    <text x="170" y="444" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">DEFINE</text>

    <text x="208" y="444" font-size="13" fill="#484f58">&#x2192;</text>

    <rect x="220" y="426" width="64" height="28" fill="#1a1f29" stroke="#e8a87c" stroke-width="1.2" rx="5"/>
    <text x="252" y="444" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">DESIGN</text>

    <text x="290" y="444" font-size="13" fill="#484f58">&#x2192;</text>

    <rect x="302" y="426" width="56" height="28" fill="#1a1f29" stroke="#e8a87c" stroke-width="1.2" rx="5"/>
    <text x="330" y="444" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">BUILD</text>

    <text x="364" y="444" font-size="13" fill="#484f58">&#x2192;</text>

    <rect x="376" y="426" width="50" height="28" fill="#1a1f29" stroke="#e8a87c" stroke-width="1.2" rx="5"/>
    <text x="401" y="444" font-size="10" fill="#e8a87c" text-anchor="middle" font-weight="bold">SHIP</text>
