  <g fill="#e8a87c">
    <rect x="564" y="35" width="18" height="18" rx="2"/>
    <rect x="586" y="35" width="18" height="18" rx="2"/>
    <rect x="608" y="35" width="18" height="18" rx="2"/>
    <rect x="630" y="35" width="18" height="18" rx="2"/>
